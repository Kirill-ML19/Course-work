services:
  db:
    image: postgres:16
    container_name: vk_postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports: 
      - '5432:5432'

    volumes:
      - 'postgres_data:/var/lib/postgresql/data'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    
    logging:
      options:
        max-size: '10m'
        max-file: '3'

  neo4j:
    image: neo4j:5.20
    container_name: vk_neo4j
    restart: always

    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'

    ports:
      - "7474:7474"
      - "7687:7687" 
  
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import

    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1;'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      options:
        max-size: '10m'
        max-file: '3'   

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import: